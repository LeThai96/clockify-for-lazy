name: Clockify daily

on:
  schedule:
    # 10:00 UTC (17:00 GMT+7)
    - cron: "0 10 * * *"
  workflow_dispatch:

concurrency:
  group: clockify-daily
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  log:
    runs-on: ubuntu-latest
    env:
      CLOCKIFY_API_KEY: ${{ secrets.CLOCKIFY_API_KEY }}
      CLOCKIFY_WORKSPACE_ID: ${{ secrets.CLOCKIFY_WORKSPACE_ID }}
      CLOCKIFY_PROJECT_ID: ${{ secrets.CLOCKIFY_PROJECT_ID }}
      TIMEZONE: Asia/Bangkok
      WORKDAY_START: "09:00"
      WORKDAY_END: "18:00"
      MIN_ENTRIES: "2"
      MAX_ENTRIES: "4"
      MIN_MINUTES: "30"
      MAX_MINUTES: "120"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Create time entries
        run: python scripts/clockify_daily.py
